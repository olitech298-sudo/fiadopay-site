<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo | FiaPay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f4f2fb;
      color: #1a1a2e;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #3B2C8A 0%, #5B3FB5 100%);
      padding: 28px 20px 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(59,44,138,0.3);
    }
    .header .brand {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .header .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 680px;
      margin: 24px auto 0;
      padding: 0 16px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 18px 12px 44px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(59,44,138,0.08);
      outline: none;
      color: #1a1a2e;
    }
    .search-icon {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #9b8ec4;
      pointer-events: none;
    }

    /* ── Category filters ── */
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 16px 16px 4px;
      max-width: 680px;
      margin: 0 auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      white-space: nowrap;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #c5bde8;
      background: #fff;
      color: #5B3FB5;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #3B2C8A, #5B3FB5);
      color: #fff;
      border-color: transparent;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      padding: 16px;
      max-width: 680px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(59,44,138,0.08);
      border: 1.5px solid rgba(91,63,181,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(59,44,138,0.15);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #ede9f7;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #ede9f7, #ddd6f3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.35;
      color: #5B3FB5;
    }
    .card-body {
      padding: 10px 12px 12px;
    }
    .card-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-category {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(91,63,181,0.1);
      color: #5B3FB5;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-unit {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.1);
      color: #666;
      font-size: 11px;
      margin-left: 4px;
    }
    .card-price {
      font-size: 17px;
      font-weight: 800;
      color: #4CAF50;
      margin-top: 6px;
    }

    /* ── Botão adicionar ao carrinho ── */
    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      margin-top: 10px;
      padding: 8px 0;
      background: linear-gradient(135deg, #3B2C8A, #5B3FB5);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 1;
    }
    .btn-add svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Controles de quantidade no card */
    .card-qty-ctrl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      background: rgba(91,63,181,0.08);
      border-radius: 10px;
      overflow: hidden;
    }
    .card-qty-ctrl button {
      width: 36px;
      height: 34px;
      border: none;
      background: transparent;
      color: #5B3FB5;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .card-qty-ctrl button:hover { background: rgba(91,63,181,0.15); }
    .card-qty-ctrl span {
      font-size: 14px;
      font-weight: 700;
      color: #3B2C8A;
    }

    /* ── Contagem de estoque ── */
    .card-stock-count {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* ── Stock badges ── */
    .badge-esgotado {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      background: #fee2e2;
      color: #dc2626;
      font-size: 11px;
      font-weight: 700;
      margin-top: 5px;
    }
    .badge-ultima {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      background: #fff3cd;
      color: #b45309;
      font-size: 11px;
      font-weight: 700;
      margin-top: 5px;
    }

    /* ── Botão flutuante do carrinho ── */
    .cart-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3B2C8A, #5B3FB5);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(59,44,138,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 100;
    }
    .cart-fab:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 32px rgba(59,44,138,0.5);
    }
    .cart-fab svg { width: 26px; height: 26px; }
    .cart-fab-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #e53935;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #f4f2fb;
    }

    /* ── Modal do carrinho ── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .cart-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .cart-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 85vh;
      background: #fff;
      border-radius: 24px 24px 0 0;
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      max-width: 680px;
      margin: 0 auto;
    }
    .cart-drawer.open { transform: translateY(0); }
    .cart-handle {
      width: 40px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f0eef8;
      flex-shrink: 0;
    }
    .cart-header h2 {
      font-size: 18px;
      font-weight: 800;
      color: #1a1a2e;
    }
    .cart-header-count {
      font-size: 13px;
      font-weight: 600;
      color: #888;
    }
    .cart-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f4f2fb;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5B3FB5;
      font-size: 18px;
      line-height: 1;
    }
    .cart-items {
      overflow-y: auto;
      flex: 1;
      padding: 12px 20px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0eef8;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cart-item-unit-price {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .cart-item-subtotal {
      font-size: 14px;
      font-weight: 800;
      color: #4CAF50;
      white-space: nowrap;
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0;
      background: #f4f2fb;
      border-radius: 10px;
      overflow: hidden;
    }
    .cart-item-qty button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #5B3FB5;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item-qty button:hover { background: rgba(91,63,181,0.15); }
    .cart-item-qty span {
      width: 28px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #3B2C8A;
    }

    /* Carrinho vazio */
    .cart-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 12px;
      color: #bbb;
    }
    .cart-empty svg { opacity: 0.3; }
    .cart-empty p {
      font-size: 15px;
      font-weight: 600;
      color: #aaa;
    }

    /* Footer do carrinho */
    .cart-footer {
      padding: 16px 20px 28px;
      border-top: 1px solid #f0eef8;
      flex-shrink: 0;
    }
    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .cart-total-label {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .cart-total-value {
      font-size: 20px;
      font-weight: 800;
      color: #3B2C8A;
    }
    .btn-checkout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px;
      background: #25D366;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .btn-checkout:hover { background: #1ebe5d; }
    .btn-checkout svg { width: 20px; height: 20px; flex-shrink: 0; }
    .btn-continue {
      display: block;
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #5B3FB5;
      font-size: 14px;
      font-weight: 700;
      border: 1.5px solid #c5bde8;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-continue:hover { background: #f4f2fb; }

    /* ── States ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      gap: 12px;
      padding: 32px 16px;
      text-align: center;
    }
    .state svg { opacity: 0.3; }
    .state-title {
      font-size: 18px;
      font-weight: 700;
      color: #3B2C8A;
    }
    .state-sub {
      font-size: 14px;
      color: #888;
      max-width: 280px;
      line-height: 1.5;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 32px 16px 24px;
      font-size: 13px;
      color: #aaa;
    }
    .footer a {
      color: #5B3FB5;
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover { text-decoration: underline; }
    .btn-ver-todos {
      display: block;
      text-align: center;
      margin: 0 16px 16px;
      padding: 10px;
      background: #fff;
      color: #5B3FB5;
      font-size: 13px;
      font-weight: 700;
      border: 1.5px solid #c5bde8;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-ver-todos:hover { background: #ede9f7; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3B2C8A;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 2000;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .qty-limit-msg {
      font-size: 11px;
      color: #e05252;
      font-weight: 600;
      margin-top: 4px;
      text-align: center;
    }

    /* ── Seletor de quantidade pré-adição ── */
    .pre-qty-wrap {
      margin-top: 10px;
    }
    .pre-qty-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pre-qty-ctrl {
      display: flex;
      align-items: center;
      background: rgba(91,63,181,0.08);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .pre-qty-ctrl button {
      width: 32px;
      height: 34px;
      border: none;
      background: transparent;
      color: #5B3FB5;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pre-qty-ctrl button:hover:not(:disabled) { background: rgba(91,63,181,0.15); }
    .pre-qty-ctrl button:disabled { opacity: 0.3; cursor: default; }
    .pre-qty-ctrl span {
      min-width: 26px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #3B2C8A;
    }

    /* ── Variantes inline no card ── */
    .card-variants { margin-top: 6px; display: flex; flex-direction: column; gap: 5px; }
    .card-variant-label {
      font-size: 10px;
      font-weight: 700;
      color: #9b8ec4;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1px;
    }
    .card-variant-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .chip-sm {
      padding: 3px 9px;
      border-radius: 8px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.5;
    }
    .chip-sm:hover { border-color: #5c3fb5; color: #5c3fb5; }
    .chip-sm-active {
      border-color: #5c3fb5;
      background: rgba(92,63,181,0.12);
      color: #5c3fb5;
    }
    .swatch-sm {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.12);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      padding: 0;
    }
    .swatch-sm:hover { transform: scale(1.2); border-color: #5c3fb5; }
    .swatch-sm-active {
      border-color: #5c3fb5 !important;
      box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px #5c3fb5;
      transform: scale(1.15);
    }
    .chip-sm-esgotado {
      opacity: 0.45;
      cursor: not-allowed;
      text-decoration: line-through;
    }
    .swatch-sm-esgotado { cursor: not-allowed; }
    .variant-hint {
      font-size: 10px;
      color: #b094e0;
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── Variant Modal ── */
    .variant-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1200;
      align-items: flex-end;
      justify-content: center;
    }
    .variant-overlay.open { display: flex; }
    .variant-sheet {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
      position: relative;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .variant-product-img-wrap {
      width: 100%;
      position: relative;
      border-radius: 24px 24px 0 0;
      overflow: hidden;
      background: #ede9f7;
    }
    .variant-product-img-wrap img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      display: block;
    }
    .variant-product-img-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #ede9f7, #ddd6f3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .variant-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.92);
      color: #333;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      z-index: 20;
      line-height: 1;
    }
    .variant-body { padding: 20px 20px 36px; }
    .variant-handle {
      width: 40px; height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .variant-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 22px;
    }
    .variant-product-name {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      flex: 1;
      line-height: 1.3;
    }
    .variant-product-price {
      font-size: 20px;
      font-weight: 800;
      color: #4CAF50;
      white-space: nowrap;
    }
    .variant-section-label {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .variant-selected-tag {
      font-size: 13px;
      font-weight: 600;
      color: #5c3fb5;
    }
    .variant-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .variant-chip {
      padding: 9px 20px;
      border-radius: 10px;
      border: 2px solid #d1d5db;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 48px;
      text-align: center;
    }
    .variant-chip:hover:not(.esgotado) { border-color: #5c3fb5; color: #5c3fb5; }
    .variant-chip.selected { border-color: #5c3fb5; background: #5c3fb5; color: #fff; }
    .variant-chip.esgotado { opacity: 0.38; cursor: not-allowed; text-decoration: line-through; background: #f5f5f5; }
    /* Color swatches */
    .variant-color-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .variant-color-swatch-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .variant-color-swatch-btn:hover:not(.esgotado) { background: rgba(91,63,181,0.08); }

</head>

<script>
  const SUPABASE_URL = 'https://apwftgnegplozqsnaybw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwd2Z0Z25lZ3Bsb3pxc25heWJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3MjE4MjgsImV4cCI6MjA4NTI5NzgyOH0.VneAxjJ0OmKh0tPbHhjE3bITKgUlYiS6JsugsazP1AI';

  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
    'Content-Type': 'application/json',
  };

  let allProducts = [];
  let activeCategory = 'Todos';
  let storeWhatsapp = null;
  let viewingOrder = false;
  let storeUserId = null;

  function getColorCss(name) {
    const map = {
      'preto': '#1a1a1a', 'negro': '#1a1a1a', 'black': '#1a1a1a',
      'branco': '#f0f0f0', 'white': '#f0f0f0',
      'cinza': '#9e9e9e', 'gray': '#9e9e9e', 'grey': '#9e9e9e',
      'cinza claro': '#e0e0e0', 'cinza escuro': '#616161',
      'azul': '#1565C0', 'blue': '#1565C0',
      'azul marinho': '#0D2137', 'marinho': '#0D2137',
      'azul royal': '#1a3a8f', 'royal': '#1a3a8f',
      'azul claro': '#42a5f5', 'celeste': '#42a5f5',
      'vermelho': '#c62828', 'red': '#c62828',
      'verde': '#2e7d32', 'green': '#2e7d32',
      'verde claro': '#66bb6a', 'verde militar': '#4e6c44',
      'amarelo': '#f9a825', 'yellow': '#f9a825',
      'laranja': '#e65100', 'orange': '#e65100',
      'rosa': '#e91e63', 'pink': '#e91e63', 'rosa claro': '#f48fb1',
      'roxo': '#6a1b9a', 'purple': '#6a1b9a',
      'lilás': '#9c27b0', 'lilas': '#9c27b0',
      'vinho': '#6d1919', 'bordô': '#6d1919', 'bordo': '#6d1919',
      'marrom': '#5d4037', 'brown': '#5d4037', 'café': '#5d4037', 'cafe': '#5d4037',
      'bege': '#d7c5a6', 'beige': '#d7c5a6',
      'caramelo': '#a0522d',
      'dourado': '#d4a017', 'gold': '#d4a017', 'ouro': '#d4a017',
      'prata': '#b0bec5', 'silver': '#b0bec5',
      'creme': '#fff8e1',
    };
    return map[name.toLowerCase().trim()] || null;
  }

  // ── Quantidade pré-adição (produtos simples) ─────────────
  const preQty = {}; // { productName: qty }

  function getPreQty(name) { return preQty[name] || 1; }

  function changePreQty(name, stock, delta) {
    const next = Math.max(1, Math.min(stock, getPreQty(name) + delta));
    preQty[name] = next;
    const safeId = name.replace(/[^a-zA-Z0-9]/g, '_');
    const valEl = document.getElementById(`pqv-${safeId}`);
    const minBtn = document.getElementById(`pqm-${safeId}`);
    if (valEl) valEl.textContent = next;
    if (minBtn) minBtn.disabled = next <= 1;
  }

  function addWithPreQty(name, price, unit, stock) {
    const qty = getPreQty(name);
    const key = `${name}||`;
    cart.set(key, { key, name, price, unit, stock, qty });
    delete preQty[name];
    syncCartUI();
    applyFilters();
    showToast(`${qty}× ${name} adicionado`);
  }

  // ── Carrinho ──────────────────────────────────────────────
  // cart: Map<name, { name, price, unit, qty }>
  const cart = new Map();

  function cartTotal() {
    let t = 0;
    cart.forEach(i => t += i.price * i.qty);
    return t;
  }

  function cartItemCount() {
    let n = 0;
    cart.forEach(i => n += i.qty);
    return n;
  }

  function addToCart(name, price, unit, stock, size = '', color = '') {
    const key = `${name}||${size}||${color}`;
    if (cart.has(key)) {
      const item = cart.get(key);
      if (item.qty < item.stock) item.qty++;
    } else {
      cart.set(key, { key, name, price, unit, stock, qty: 1, size, color });
    }
    syncCartUI();
    applyFilters();
  }

  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  function changeQty(key, delta) {
    if (!cart.has(key)) return;
    const item = cart.get(key);
    if (delta > 0 && item.qty >= item.stock) {
      showToast(`Limite do estoque atingido (${item.stock} disponível)`);
      return;
    }
    item.qty += delta;
    if (item.qty <= 0) cart.delete(key);
    syncCartUI();
    applyFilters();
  }

  function syncCartUI() {
    const count = cartItemCount();
    const fab = document.getElementById('cartFab');
    const badge = document.getElementById('cartBadge');
    fab.style.display = count > 0 && !viewingOrder ? 'flex' : 'none';
    badge.textContent = count;
    renderCartDrawer();
  }

  function renderCartDrawer() {
    const itemsEl = document.getElementById('cartItems');
    const footerEl = document.getElementById('cartFooter');
    const countEl = document.getElementById('cartHeaderCount');
    const count = cartItemCount();

    countEl.textContent = count > 0 ? `${count} ${count === 1 ? 'item' : 'itens'}` : '';

    if (cart.size === 0) {
      itemsEl.innerHTML = `
        <div class="cart-empty">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#5B3FB5" stroke-width="1.5">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <p>Nenhum item adicionado</p>
        </div>`;
      footerEl.innerHTML = `
        <button class="btn-continue" onclick="closeCart()">← Voltar ao catálogo</button>`;
      return;
    }

    let html = '';
    cart.forEach(item => {
      const variantParts = [item.size, item.color].filter(Boolean);
      const variantLabel = variantParts.length ? ` <span style="font-size:11px;color:#7c3aed;font-weight:600">(${escHtml(variantParts.join(' / '))})</span>` : '';
      html += `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${escHtml(item.name)}${variantLabel}</div>
            <div class="cart-item-unit-price">${formatPrice(item.price)} / ${escHtml(item.unit || 'un')}</div>
          </div>
          <div class="cart-item-qty">
            <button onclick="changeQty('${escAttr(item.key)}', -1)">−</button>
            <span>${item.qty}</span>
            <button onclick="changeQty('${escAttr(item.key)}', 1)">+</button>
          </div>
          <div class="cart-item-subtotal">${formatPrice(item.price * item.qty)}</div>
        </div>`;
    });
    itemsEl.innerHTML = html;

    const total = cartTotal();
    footerEl.innerHTML = `
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-value">${formatPrice(total)}</span>
      </div>
      <button class="btn-finalizar" onclick="openCheckout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Finalizar Pedido
      </button>
      <button class="btn-continue" onclick="closeCart()">← Continuar comprando</button>`;
  }

  function renderPedidoBanner() {
    const el = document.getElementById('pedidoBanner');
    if (!el || cart.size === 0) return;
    let rows = '';
    cart.forEach(item => {
      rows += `
        <div class="pedido-banner-row">
          <span class="pedido-banner-row-name">${escHtml(item.name)}</span>
          <span class="pedido-banner-row-qty">${item.qty}x</span>
          <span class="pedido-banner-row-price">${formatPrice(item.price * item.qty)}</span>
        </div>`;
    });
    el.innerHTML = `
      <div class="pedido-banner">
        <div class="pedido-banner-inner">
          <div class="pedido-banner-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Resumo do Pedido
          </div>
          <div class="pedido-banner-items">${rows}</div>
          <div class="pedido-banner-total">
            <span>Total</span>
            <span>${formatPrice(cartTotal())}</span>
          </div>
        </div>
      </div>`;
  }

  function buildOrderWhatsappLink() {
    let lines = 'Olá! Gostaria de fazer um pedido:\n\n';
    cart.forEach(item => {
      lines += `• ${item.qty}x ${item.name} — ${formatPrice(item.price * item.qty)}\n`;
    });
    lines += `\n*Total: ${formatPrice(cartTotal())}*`;

    const baseSearch = window.location.search.replace(/&produto=[^&]*/,'').replace(/&pedido=[^&]*/,'');
    const cartEncoded = Array.from(cart.values())
      .map(item => `${encodeURIComponent(item.name)}:${item.qty}`)
      .join('|');
    const catalogUrl = window.location.href.split('?')[0] + baseSearch + '&pedido=' + cartEncoded;
    lines += `\n\n${catalogUrl}`;
    return `https://wa.me/${storeWhatsapp}?text=${encodeURIComponent(lines)}`;
  }

  function openCart() {
    document.getElementById('cartOverlay').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
    renderCartDrawer();
  }

  function closeCart() {
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
  }

  // ── Catálogo ─────────────────────────────────────────────

  async function supabaseGet(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function supabasePost(path, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method: 'POST',
      headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }
  }

  // ── Checkout ──────────────────────────────────────────────

  function openCheckout() {
    closeCart();
    // Monta resumo do pedido
    let rows = '';
    cart.forEach(item => {
      rows += `<div class="checkout-summary-row">
        <span>${item.qty}x ${escHtml(item.name)}</span>
        <span>${formatPrice(item.price * item.qty)}</span>
      </div>`;
    });
    rows += `<div class="checkout-summary-total">
      <span>Total estimado</span>
      <span>${formatPrice(cartTotal())}</span>
    </div>`;
    document.getElementById('checkoutSummary').innerHTML = rows;
    document.getElementById('checkoutError').style.display = 'none';
    document.getElementById('checkoutFormStep').style.display = '';
    document.getElementById('checkoutSuccessStep').style.display = 'none';
    const btn = document.getElementById('checkoutSubmitBtn');
    btn.disabled = false;
    btn.innerHTML = 'Confirmar Pedido';
    document.getElementById('checkoutOverlay').classList.add('open');
  }

  function closeCheckout() {
    document.getElementById('checkoutOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('checkoutOverlay')) closeCheckout();
  }

  async function submitOrder() {
    const name  = document.getElementById('checkoutName').value.trim();
    const phone = document.getElementById('checkoutPhone').value.trim();
    const notes = document.getElementById('checkoutNotes').value.trim();
    const errEl = document.getElementById('checkoutError');
    const btn   = document.getElementById('checkoutSubmitBtn');

    errEl.style.display = 'none';

    if (!name) {
      errEl.textContent = 'Por favor, informe seu nome.';
      errEl.style.display = 'block';
      return;
    }
    if (!phone) {
      errEl.textContent = 'Por favor, informe seu telefone.';
      errEl.style.display = 'block';
      return;
    }
    if (cart.size === 0) {
      errEl.textContent = 'Carrinho vazio.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-sm"></div> Enviando...';

    try {
      // Re-busca preços diretamente do banco para evitar manipulação
      const uniqueNames = [...new Set([...cart.values()].map(i => i.name))];
      const nameFilters = uniqueNames.map(n => `name.eq.${encodeURIComponent(n)}`).join(',');
      const freshProducts = await supabaseGet(
        `products?user_id=eq.${storeUserId}&or=(${nameFilters})&catalog_visible=eq.true&select=name,price`
      );

      const priceMap = new Map(freshProducts.map(p => [p.name, parseFloat(p.price)]));

      let amount = 0;
      const descParts = [];
      cart.forEach(item => {
        const freshPrice = priceMap.get(item.name);
        if (freshPrice == null) return; // produto removido do catálogo — ignora
        amount += freshPrice * item.qty;
        const variantParts = [item.size, item.color].filter(Boolean);
        const displayName = variantParts.length ? `${item.name} (${variantParts.join(' / ')})` : item.name;
        descParts.push(`${item.qty}x ${displayName}`);
      });

      if (descParts.length === 0) {
        throw new Error('Nenhum produto do carrinho está disponível no catálogo.');
      }

      await supabasePost('pedidos', {
        user_id:       storeUserId,
        customer_name: name,
        phone:         phone,
        description:   descParts.join(', '),
        amount:        parseFloat(amount.toFixed(2)),
        status:        'pendente',
        source:        'catalog',
        notes:         notes || null,
      });

      // Sucesso — limpa carrinho
      cart.clear();
      syncCartUI();

      // Monta e abre WhatsApp automaticamente
      if (storeWhatsapp) {
        let waLines = `Olá! Acabei de fazer um pedido pelo catálogo 🛒\n\n`;
        descParts.forEach(desc => {
          const parts = desc.match(/^(\d+)x (.+)$/);
          if (!parts) return;
          const [, qty, label] = parts;
          // Extrai nome base sem a variante entre parênteses ex: "Camiseta (M / Azul)" → "Camiseta"
          const baseName = label.replace(/ \([^)]+\)$/, '');
          const fp = priceMap.get(baseName) ?? 0;
          waLines += `• ${qty}x ${label} — ${formatPrice(parseFloat(fp) * parseInt(qty))}\n`;
        });
        waLines += `\n*Total: ${formatPrice(amount)}*`;
        waLines += `\n\nNome: ${name}\nTelefone: ${phone}`;
        if (notes) waLines += `\nObservações: ${notes}`;
        const waUrl = `https://wa.me/${storeWhatsapp}?text=${encodeURIComponent(waLines)}`;

        // Abre WhatsApp automaticamente
        window.open(waUrl, '_blank');

        // Mantém botão na tela de sucesso caso o navegador bloqueie o popup
        document.getElementById('successWaBtn').innerHTML =
          `<a class="btn-whatsapp-notify" href="${waUrl}" target="_blank" rel="noopener">
             <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
               <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.11.55 4.16 1.6 5.97L0 24l6.22-1.57A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.21-1.25-6.22-3.48-8.52ZM12 22c-1.85 0-3.66-.5-5.24-1.44l-.38-.22-3.93.99 1.04-3.82-.24-.39A9.94 9.94 0 0 1 2 12C2 6.48 6.48 2 12 2c2.67 0 5.18 1.04 7.07 2.93A9.94 9.94 0 0 1 22 12c0 5.52-4.48 10-10 10Zm5.47-7.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.27-.47-2.41-1.5-.89-.8-1.49-1.78-1.67-2.08-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51H6.8c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.48s1.07 2.87 1.22 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.27.49 1.7.63.72.23 1.37.2 1.89.12.58-.09 1.76-.72 2.01-1.41.25-.69.25-1.28.17-1.41-.07-.12-.27-.2-.57-.34Z"/>
             </svg>
             Abrir WhatsApp novamente
           </a>`;
      } else {
        document.getElementById('successWaBtn').innerHTML = '';
      }

      document.getElementById('successMsg').textContent =
        `Pedido recebido, ${name.split(' ')[0]}! O WhatsApp foi aberto para confirmar com o vendedor.`;
      document.getElementById('checkoutFormStep').style.display = 'none';
      document.getElementById('checkoutSuccessStep').style.display = '';

    } catch (e) {
      console.error('submitOrder error:', e);
      errEl.textContent = 'Erro ao enviar o pedido. Verifique sua conexão e tente novamente.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Confirmar Pedido';
    }
  }

  function formatPrice(value) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
  }

  function normalize(s) {
    return (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
  }

  function applyFilters() {
    const q = normalize(document.getElementById('searchInput').value);
    const filtered = allProducts.filter(p => {
      const matchCat = activeCategory === 'Todos' || p.category === activeCategory;
      const matchQ = !q || normalize(p.name).includes(q) || normalize(p.category || '').includes(q);
      return matchCat && matchQ;
    });
    renderGrid(filtered);
  }

  function renderFilters(products) {
    const cats = ['Todos', ...new Set(products.map(p => p.category).filter(Boolean))];
    const el = document.getElementById('filters');
    el.innerHTML = cats.map(c => `
      <button class="filter-btn ${c === activeCategory ? 'active' : ''}"
        onclick="setCategory('${c.replace(/'/g, "\\'")}')">${c}</button>
    `).join('');
  }

  function setCategory(cat) {
    activeCategory = cat;
    renderFilters(allProducts);
    applyFilters();
  }

  function renderGrid(products) {
    const el = document.getElementById('main');
    if (products.length === 0) {
      el.innerHTML = `
        <div class="state">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#5B3FB5" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          <div class="state-title">Nenhum produto encontrado</div>
          <div class="state-sub">Tente outra busca ou categoria.</div>
        </div>`;
      return;
    }
    el.innerHTML = `<div class="grid">${products.map(cardHtml).join('')}</div>`;
  }

  function openImgModal(src, alt) {
    const modal = document.getElementById('imgModal');
    const img = document.getElementById('imgModalImg');
    img.src = src;
    img.alt = alt;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeImgModal() {
    document.getElementById('imgModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  let _variantProduct = null;
  let _variantSelectedSize = null;
  let _variantSelectedColor = null;

  function openVariantByName(name) {
    const p = allProducts.find(prod => prod.name === name);
    if (p) openVariantModal(p);
  }

  function openVariantModal(p) {
    _variantProduct = p;
    const hasSizes  = p.variants && p.variants.sizes  && p.variants.sizes.length  > 0;
    const hasColors = p.variants && p.variants.colors && p.variants.colors.length > 0;
    _variantSelectedSize  = hasSizes  ? null : '';
    _variantSelectedColor = hasColors ? null : '';

    // Imagem do produto
    const imgWrap = document.getElementById('variantProductImg');
    if (p.image_url) {
      imgWrap.innerHTML = `<img src="${escHtml(p.image_url)}" alt="${escHtml(p.name)}">`;
      imgWrap.style.display = '';
    } else {
      imgWrap.innerHTML = `<div class="variant-product-img-placeholder">${placeholderSvgInner()}</div>`;
      imgWrap.style.display = '';
    }

    document.getElementById('variantProductName').textContent = p.name;
    document.getElementById('variantProductPrice').textContent = formatPrice(p.price);
    document.getElementById('variantStockInfo').textContent = '';

    // helper: variant stock
    const vs = p.variant_stock || {};
    const hasVS = Object.keys(vs).length > 0;
    const getVS = (sz, cl) => hasVS ? (vs[`${sz||''}||${cl||''}`] ?? 0) : p.stock_quantity;
    const sizeOk = sz => hasVS
      ? (hasColors ? p.variants.colors.some(c => getVS(sz,c) > 0) : getVS(sz,'') > 0)
      : p.stock_quantity > 0;
    const colorOk = cl => hasVS
      ? (hasSizes ? p.variants.sizes.some(s => getVS(s,cl) > 0) : getVS('',cl) > 0)
      : p.stock_quantity > 0;

    const sizesSection = document.getElementById('variantSizesSection');
    if (hasSizes) {
      sizesSection.innerHTML = `
        <div class="variant-section-label">Tamanho <span class="variant-selected-tag" id="selectedSizeTag"></span></div>
        <div class="variant-chips">
          ${p.variants.sizes.map(s => {
            const avail = sizeOk(s);
            return `<button class="variant-chip${avail ? '' : ' esgotado'}"
              onclick="${avail ? `selectVariantSize('${escAttr(s)}')` : 'void 0'}"
              title="${avail ? '' : 'Esgotado'}">${escHtml(s)}</button>`;
          }).join('')}
        </div>`;
    } else {
      sizesSection.innerHTML = '';
    }

    const colorsSection = document.getElementById('variantColorsSection');
    if (hasColors) {
      const colorItems = p.variants.colors.map(c => {
        const avail = colorOk(c);
        const css = getColorCss(c);
        if (css) {
          return `<button class="variant-color-swatch-btn${avail ? '' : ' esgotado'}"
            onclick="${avail ? `selectVariantColor('${escAttr(c)}')` : 'void 0'}"
            data-color="${escAttr(c)}" title="${escHtml(c)}${avail ? '' : ' (esgotado)'}">
            <div class="variant-color-circle" style="background:${css}"></div>
            <span class="variant-color-name">${escHtml(c)}</span>
          </button>`;
        }
        return `<button class="variant-chip${avail ? '' : ' esgotado'}"
          onclick="${avail ? `selectVariantColor('${escAttr(c)}')` : 'void 0'}">${escHtml(c)}</button>`;
      }).join('');
      colorsSection.innerHTML = `
        <div class="variant-section-label">Cor <span class="variant-selected-tag" id="selectedColorTag"></span></div>
        <div class="variant-color-grid">${colorItems}</div>`;
    } else {
      colorsSection.innerHTML = '';
    }

    _updateVariantConfirmBtn();
    document.getElementById('variantModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function selectVariantSize(size) {
    _variantSelectedSize = size;
    document.querySelectorAll('#variantSizesSection .variant-chip').forEach(btn => {
      btn.classList.toggle('selected', btn.textContent.trim() === size);
    });
    const tag = document.getElementById('selectedSizeTag');
    if (tag) tag.textContent = size;
    _updateVariantConfirmBtn();
  }

  function selectVariantColor(color) {
    _variantSelectedColor = color;
    document.querySelectorAll('#variantColorsSection .variant-color-swatch-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.color === color);
    });
    document.querySelectorAll('#variantColorsSection .variant-chip').forEach(btn => {
      btn.classList.toggle('selected', btn.textContent.trim() === color);
    });
    const tag = document.getElementById('selectedColorTag');
    if (tag) tag.textContent = color;
    _updateVariantConfirmBtn();
  }

  function _updateVariantConfirmBtn() {
    const p = _variantProduct;
    if (!p) return;
    const hasSizes  = p.variants && p.variants.sizes  && p.variants.sizes.length  > 0;
    const hasColors = p.variants && p.variants.colors && p.variants.colors.length > 0;
    const sizeReady  = !hasSizes  || _variantSelectedSize  !== null;
    const colorReady = !hasColors || _variantSelectedColor !== null;
    const canConfirm = sizeReady && colorReady;
    const btn = document.getElementById('variantConfirmBtn');
    btn.disabled = !canConfirm;
    if (canConfirm) {
      const parts = [_variantSelectedSize, _variantSelectedColor].filter(Boolean);
      btn.textContent = parts.length ? `Adicionar — ${parts.join(' / ')}` : 'Adicionar ao carrinho';
    } else {
      const missing = [hasSizes && !_variantSelectedSize ? 'tamanho' : '', hasColors && !_variantSelectedColor ? 'cor' : ''].filter(Boolean);
      btn.textContent = `Selecione ${missing.join(' e ')}`;
    }
  }

  function confirmVariant() {
    if (!_variantProduct || _variantSelectedSize === null || _variantSelectedColor === null) return;
    const p = _variantProduct;
    addToCart(p.name, p.price, p.unit || 'un', p.stock_quantity, _variantSelectedSize, _variantSelectedColor);
    closeVariantModalDirect();
  }

  function closeVariantModalDirect() {
    document.getElementById('variantModal').classList.remove('open');
    document.body.style.overflow = '';
    _variantProduct = null;
  }

  function closeVariantModal(event) {
    if (event && event.target !== document.getElementById('variantModal')) return;
    closeVariantModalDirect();
  }

  function cardHtml(p) {
    const img = p.image_url
      ? `<img class="card-img" src="${escHtml(p.image_url)}" alt="${escHtml(p.name)}" loading="lazy" onclick="openImgModal('${escAttr(p.image_url)}','${escAttr(p.name)}')" onerror="this.parentNode.innerHTML=placeholderSvgInner()">`
      : `<div class="card-img-placeholder">${placeholderSvgInner()}</div>`;
    const cat = p.category ? `<span class="card-category">${escHtml(p.category)}</span>` : '';
    const unit = p.unit ? `<span class="card-unit">${escHtml(p.unit)}</span>` : '';
    const esgotado = p.stock_quantity <= 0;
    const stockBadge = esgotado
      ? `<div><span class="badge-esgotado">Esgotado</span></div>`
      : p.stock_quantity === 1
        ? `<div><span class="badge-ultima">Última unidade</span></div>`
        : '';
    // stockCount calculado depois do bloco de variantes (ver abaixo)
    let stockCount = '';

    const hasVariants = p.variants && ((p.variants.sizes && p.variants.sizes.length > 0) || (p.variants.colors && p.variants.colors.length > 0));
    const simpleKey = `${p.name}||`;
    const totalInCart = (() => { let t = 0; cart.forEach(i => { if (i.name === p.name) t += i.qty; }); return t; })();
    const inCart = !hasVariants && cart.has(simpleKey);
    let actionBtn;

    if (viewingOrder) {
      actionBtn = `
        <div class="card-qty-ctrl">
          <button disabled style="opacity:0.3;cursor:default">−</button>
          <span>${totalInCart}</span>
          <button disabled style="opacity:0.3;cursor:default">+</button>
        </div>`;
    } else if (esgotado) {
      actionBtn = `<button class="btn-add" disabled>Esgotado</button>`;
    } else if (hasVariants) {
      const cartBadge = totalInCart > 0
        ? `<div class="variant-in-cart-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="M9 11l3 3L22 4"/></svg>
            ${totalInCart} ${totalInCart === 1 ? 'item' : 'itens'} no carrinho
           </div>`
        : '';
      actionBtn = `
        ${cartBadge}
        <button class="btn-add" onclick="openVariantByName('${escAttr(p.name)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Escolher opções
        </button>`;
      if (!esgotado && p.stock_quantity > 1) {
        stockCount = `<div class="card-stock-count">${p.stock_quantity} em estoque</div>`;
      }
    } else if (inCart) {
      const qty = cart.get(simpleKey).qty;
      const atMax = qty >= p.stock_quantity;
      actionBtn = `
        <div class="card-qty-ctrl">
          <button onclick="changeQty('${escAttr(simpleKey)}', -1)">−</button>
          <span>${qty}</span>
          <button onclick="changeQty('${escAttr(simpleKey)}', 1)" ${atMax ? 'disabled style="opacity:0.3;cursor:default"' : ''}>+</button>
        </div>
        ${atMax ? `<div class="qty-limit-msg">Limite do estoque atingido</div>` : ''}`;
    } else {
      if (!esgotado && p.stock_quantity > 1) {
        stockCount = `<div class="card-stock-count">${p.stock_quantity} em estoque</div>`;
      }
      const pq = getPreQty(p.name);
      const pqAtMax = pq >= p.stock_quantity;
      const safeId = p.name.replace(/[^a-zA-Z0-9]/g, '_');
      actionBtn = `
        <div class="pre-qty-wrap">
          <div class="pre-qty-row">
            <div class="pre-qty-ctrl">
              <button id="pqm-${safeId}" onclick="changePreQty('${escAttr(p.name)}',${p.stock_quantity},-1)" ${pq <= 1 ? 'disabled' : ''}>−</button>
              <span id="pqv-${safeId}">${pq}</span>
              <button onclick="changePreQty('${escAttr(p.name)}',${p.stock_quantity},1)" ${pqAtMax ? 'disabled' : ''}>+</button>
            </div>
            <button class="btn-add" style="flex:1;margin:0" onclick="addWithPreQty('${escAttr(p.name)}',${p.price},'${escAttr(p.unit||'un')}',${p.stock_quantity})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
              Adicionar
            </button>
          </div>
        </div>`;
    }

    return `
      <div class="card">
        ${img}
        <div class="card-body">
          <div class="card-name">${escHtml(p.name)}</div>
          <div>${cat}${unit}</div>
          <div class="card-price">${formatPrice(p.price)}</div>
          ${stockCount}
          ${stockBadge}
          ${actionBtn}
        </div>
      </div>`;
  }

  function placeholderSvgInner() {
    return `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#5B3FB5" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M3 9l4-4 4 4 4-4 4 4"/>
      <circle cx="8.5" cy="13.5" r="1.5"/>
    </svg>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  function showError(msg) {
    document.getElementById('main').innerHTML = `
      <div class="state">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#5B3FB5" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        <div class="state-title">${msg}</div>
        <div class="state-sub">Verifique se o link está correto ou peça um novo link ao vendedor.</div>
      </div>`;
  }

  async function load() {
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user');
    storeUserId = userId;

    if (!userId) {
      document.getElementById('storeName').textContent = 'Link inválido';
      showError('Parâmetro de usuário ausente.');
      return;
    }

    document.getElementById('main').innerHTML = `
      <div class="state"><div class="spinner"></div><div class="state-sub">Carregando catálogo...</div></div>`;

    try {
      const settings = await supabaseGet(
        `catalog_settings?user_id=eq.${userId}&catalog_public=eq.true&select=store_name,whatsapp_number&limit=1`
      );

      if (!settings.length) {
        document.getElementById('storeName').textContent = 'Catálogo indisponível';
        showError('Este catálogo não está disponível ou foi desativado.');
        return;
      }

      const storeName = settings[0].store_name || 'Catálogo';
      storeWhatsapp = settings[0].whatsapp_number || null;
      document.title = `${storeName} | FiaPay`;
      document.getElementById('storeName').textContent = storeName;

      const produtoParam = params.get('produto');

      if (produtoParam) {
        document.querySelector('.search-wrap').style.display = 'none';
        document.getElementById('filters').style.display = 'none';

        const match = await supabaseGet(
          `products?user_id=eq.${userId}&name=ilike.${encodeURIComponent(produtoParam)}&select=name,price,category,image_url,unit,stock_quantity&limit=1`
        );

        document.getElementById('productCount').textContent =
          match.length ? '1 produto' : 'Produto não encontrado';
        renderGrid(match);

        const catalogBase = window.location.origin + window.location.pathname + '?user=' + userId;
        const btn = document.createElement('a');
        btn.href = catalogBase;
        btn.className = 'btn-ver-todos';
        btn.textContent = '← Ver catálogo completo';
        document.getElementById('main').after(btn);
      } else {
        const products = await supabaseGet(
          `products?user_id=eq.${userId}&catalog_visible=eq.true&select=name,price,category,image_url,unit,stock_quantity,variants,variant_stock&order=name.asc`
        );
        allProducts = products;
        document.getElementById('productCount').textContent =
          `${products.length} produto${products.length !== 1 ? 's' : ''}`;
        renderFilters(products);

        const pedidoParam = params.get('pedido');
        if (pedidoParam) {
          const orderedProducts = [];
          pedidoParam.split('|').forEach(entry => {
            const colonIdx = entry.lastIndexOf(':');
            if (colonIdx === -1) return;
            const name = decodeURIComponent(entry.slice(0, colonIdx));
            const qty = parseInt(entry.slice(colonIdx + 1), 10);
            if (!name || isNaN(qty) || qty <= 0) return;
            const product = products.find(p => p.name === name);
            if (product) {
              cart.set(name, { name, price: product.price, unit: product.unit, qty });
              orderedProducts.push(product);
            }
          });

          if (orderedProducts.length > 0) {
            viewingOrder = true;
            document.querySelector('.search-wrap').style.display = 'none';
            document.getElementById('filters').style.display = 'none';
            document.getElementById('productCount').textContent =
              `${orderedProducts.length} produto${orderedProducts.length !== 1 ? 's' : ''} no pedido`;
            renderGrid(orderedProducts);
            syncCartUI();
            renderPedidoBanner();

            const catalogBase = window.location.origin + window.location.pathname + '?user=' + userId;
            const btn = document.createElement('a');
            btn.href = catalogBase;
            btn.className = 'btn-ver-todos';
            btn.textContent = '← Ver catálogo completo';
            document.getElementById('main').after(btn);
            return;
          }
        }

        applyFilters();
      }
    } catch (e) {
      console.error(e);
      document.getElementById('storeName').textContent = 'Erro';
      showError('Não foi possível carregar o catálogo.');
    }
  }

  load();
</script>

<!-- Modal de Checkout -->
<div class="checkout-overlay" id="checkoutOverlay" onclick="handleOverlayClick(event)">
  <div class="checkout-modal" id="checkoutModal" onclick="event.stopPropagation()">

    <!-- Passo 1: Formulário -->
    <div id="checkoutFormStep">
      <h2>Finalizar Pedido</h2>
      <p class="checkout-subtitle">Informe seus dados para concluir o pedido</p>

      <div class="checkout-summary" id="checkoutSummary"></div>

      <div class="checkout-error" id="checkoutError"></div>

      <div class="checkout-field">
        <label for="checkoutName">Nome completo *</label>
        <input type="text" id="checkoutName" placeholder="Seu nome" autocomplete="name" />
      </div>
      <div class="checkout-field">
        <label for="checkoutPhone">Telefone / WhatsApp *</label>
        <input type="tel" id="checkoutPhone" placeholder="(11) 99999-9999" autocomplete="tel" />
      </div>
      <div class="checkout-field">
        <label for="checkoutNotes">Observações (opcional)</label>
        <textarea id="checkoutNotes" placeholder="Ex: entregar na rua X, número Y..."></textarea>
      </div>

      <button class="btn-confirm" id="checkoutSubmitBtn" onclick="submitOrder()">
        Confirmar Pedido
      </button>
      <button class="checkout-back" onclick="closeCheckout()">← Voltar ao carrinho</button>
    </div>

    <!-- Passo 2: Sucesso -->
    <div id="checkoutSuccessStep" style="display:none">
      <div class="checkout-success">
        <div class="success-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2E7D32"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>
        <h3>Pedido enviado!</h3>
        <p id="successMsg">Seu pedido foi recebido. O vendedor entrará em contato em breve.</p>
        <div id="successWaBtn"></div>
        <button class="btn-close-checkout" onclick="closeCheckout()">Fechar</button>
      </div>
    </div>

  </div>
</div>
</body>
</html>
